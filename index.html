<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE TV PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-red: #ff0000;
            --text-white: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --active-gradient: linear-gradient(145deg, #ff0000, #b30000);
        }

        body {
            margin: 0;
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            user-select: none;
            overflow-x: hidden;
        }

        /* স্টিকি প্লেয়ার এবং গ্লাস ইফেক্ট */
        .sticky-player {
            position: sticky;
            top: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        iframe {
            position: absolute;
            top: -50px;
            left: 0;
            width: 100%;
            height: calc(100% + 100px);
            border: none;
        }

        /* ইউনিক ও ছোট ক্যাটাগরি ট্যাব */
        .category-container {
            display: flex;
            gap: 8px;
            padding: 12px 15px;
            overflow-x: auto;
            white-space: nowrap;
            background: #0a0a0a;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .category-container::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .category-tab.active {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            font-weight: 600;
        }

        .app-title {
            padding: 10px 15px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            color: #e0e0e0;
        }

        .live-dot {
            height: 8px;
            width: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--accent-red);
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* চ্যানেল গ্রিড এবং কার্ড ডিজাইন */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 12px 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .channel-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            position: relative;
        }

        .channel-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.07);
        }

        .channel-card.active-channel {
            border-color: var(--accent-red);
            background: rgba(255, 0, 0, 0.08);
        }

        .channel-card img {
            width: 42px;
            height: 42px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .channel-card span {
            font-size: 11px;
            font-weight: 400;
            display: block;
            color: #ddd;
        }

        .active-channel span {
            color: var(--accent-red);
            font-weight: 600;
        }

        .channel-card:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

<div class="sticky-player">
    <div class="video-wrapper">
        <iframe id="tvPlayer" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<div class="category-container" id="cat-tabs">
    </div>

<div class="app-title">
    <span class="live-dot"></span> <span id="category-subtitle">সব জনপ্রিয় চ্যানেল</span>
</div>

<div class="grid-container" id="channelGrid">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAY5LeTpS9hFUCBy1Oo6DWEqoTC4k6BMEY",
        authDomain: "live-tv-efde3.firebaseapp.com",
        databaseURL: "https://live-tv-efde3-default-rtdb.firebaseio.com",
        projectId: "live-tv-efde3",
        appId: "1:333958650495:web:bf90c5feba387586347d4a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allCategories = {};

    onValue(ref(db, 'tv_data'), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        allCategories = data.categories || {};

        // ক্যাটাগরি ট্যাব রেন্ডার (ছোট এবং ইউনিক ডিজাইন)
        let catHtml = `<div class="category-tab active" onclick="filterCategory('all', this)">All</div>`;
        Object.keys(allCategories).forEach(key => {
            const c = allCategories[key];
            catHtml += `<div class="category-tab" onclick="filterCategory('${c.name}', this, '${key}')">${c.name}</div>`;
        });
        document.getElementById('cat-tabs').innerHTML = catHtml;

        // চ্যানেল রেন্ডার
        let chanHtml = "";
        if(data.channels) {
            const list = Object.values(data.channels).sort((a,b) => a.order - b.order);
            list.forEach((ch, i) => {
                chanHtml += `
                <div class="channel-card" data-category="${ch.cat}" onclick="switchChannel('${ch.id}', this)">
                    <img src="${ch.logo}">
                    <span>${ch.name}</span>
                </div>`;
                if(i === 0 && !document.getElementById('tvPlayer').src) {
                    switchChannel(ch.id, null);
                }
            });
        }
        document.getElementById('channelGrid').innerHTML = chanHtml;
    });

    window.switchChannel = (vId, element) => {
        document.getElementById('tvPlayer').src = `https://www.youtube.com/embed/${vId}?autoplay=1&rel=0&modestbranding=1&controls=1`;
        
        document.querySelectorAll('.channel-card').forEach(card => card.classList.remove('active-channel'));
        if(element) element.classList.add('active-channel');
    };

    window.filterCategory = (catName, element, catKey) => {
        // ট্যাব একটিভ করা
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        
        // গ্রিড ফিল্টার
        document.querySelectorAll('.channel-card').forEach(card => {
            if (catName === 'all' || card.getAttribute('data-category') === catName) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });

        // লাইভ ডটের পাশের টেক্সট (Subtitle) পরিবর্তন
        const subtitleElement = document.getElementById('category-subtitle');
        if (catName === 'all') {
            subtitleElement.innerText = "সব জনপ্রিয় চ্যানেল";
        } else if (catKey && allCategories[catKey]) {
            // এডমিন প্যানেলের সাবটাইটেল বা ডিফল্ট নাম দেখাবে
            subtitleElement.innerText = allCategories[catKey].subtitle || catName + " চ্যানেলসমূহ";
        }
    };
</script>

</body>
</html>
